<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mezuniyet Asistanı</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-dot"></div>
    <span id="brand-title">Mezuniyet Asistanı</span>
  </div>
  <div style="display:flex;gap:8px;align-items:center">
    <span class="topbar-tag" id="memory-badge" style="color:var(--text3)">...</span>
    <span class="topbar-tag">PoC v0.2</span>
    <span class="topbar-tag" id="model-tag">model bağlı değil</span>
    <button class="topbar-tag" id="lang-toggle" onclick="toggleLanguage()" style="cursor:pointer; background:var(--bg2); border:1px solid var(--border); color:var(--text1)">EN</button>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header" id="sidebar-header">Öğrenci Seç</div>
    <div class="student-list" id="student-list"></div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">

    <!-- Student strip -->
    <div class="student-strip" id="student-strip">
      <span class="strip-empty" id="empty-hint">← Soldan bir öğrenci seçin</span>
    </div>

    <!-- Messages -->
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎓</div>
        <div class="empty-title">Mezuniyet Asistanı</div>
        <div class="empty-sub">Soldaki listeden bir öğrenci seçin, ardından mezuniyet durumu hakkında soru sorun.</div>
      </div>
    </div>

    <!-- Quick prompts -->
    <div class="quick-prompts" id="quick-prompts" style="display:none">
      <button class="qp-btn" onclick="sendQuick('When can I graduate?')">When can I graduate?</button>
      <button class="qp-btn" onclick="sendQuick('What required courses do I still need?')">Remaining courses</button>
      <button class="qp-btn" onclick="sendQuick('How many credits do I have left?')">Credits left?</button>
      <button class="qp-btn" onclick="sendQuick('What is my max course load?')">Max course load?</button>
    </div>

    <!-- Input -->
    <div class="input-area">
      <div class="input-row">
        <textarea class="input-box" id="input-box" rows="1"
          placeholder="Soru sorun... / Ask a question..."
          disabled></textarea>
        <button class="send-btn" id="send-btn" onclick="handleSend()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
      <div class="input-hint" id="input-hint">Önce soldan bir öğrenci seçin</div>
    </div>

  </div>
</div>

<!-- JS Modules — load order matters -->
<script src="js/data.js"></script>
<script src="js/chat.js"></script>
<script src="js/memory.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
